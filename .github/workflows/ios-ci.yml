name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-packages:
    name: Test ${{ matrix.package }}
    runs-on: macos-14
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - CoreUI
          - CoreNetworking
          - CoreAnalytics
          - ARHelpers
          - BluetoothHelpers
          - Web3Helpers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install Tuist
        run: mise install tuist

      - name: Resolve package dependencies
        working-directory: Packages/${{ matrix.package }}
        run: swift package resolve

      - name: Run tests — ${{ matrix.package }}
        working-directory: Packages/${{ matrix.package }}
        run: swift test --parallel

  lint-swift:
    name: Swift Lint
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build all packages (syntax check)
        run: |
          for pkg in Packages/*/; do
            echo "Building $pkg..."
            swift build --package-path "$pkg" 2>&1 || true
          done
