name: Bug report
description: Report a bug to help us improve the project
title: "[BUG] "
labels: ["type:bug"]

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened?
      placeholder: A clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Tap...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Paste images or logs if applicable

  - type: input
    id: device
    attributes:
      label: Device
      placeholder: e.g. iPhone 15 Pro

  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: e.g. iOS 18.0

  - type: dropdown
    id: app
    attributes:
      label: App
      options:
        - StepFlow
        - MadMech
        - PotentiaLudi
        - Shared (Packages)

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - ui
        - networking
        - data
        - platform
        - features

  - type: textarea
    id: additional
    attributes:
      label: Additional context
